name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.0'

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.3'

      - name: Run Go tests
        run: go test ./...

      - name: Build linux amd64 smoke artifact
        run: make linux-amd64

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.0'

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.3'

      - name: Build all release artifacts
        run: make

      - name: Package release artifacts
        run: |
          mkdir -p release
          find dist -type f \( -name 'engarde' -o -name 'engarde.exe' \) -print0 |
            while IFS= read -r -d '' artifact; do
              os="$(echo "$artifact" | cut -d/ -f2)"
              arch="$(echo "$artifact" | cut -d/ -f3)"
              name="$(basename "$artifact")"
              extension=""
              if [[ "$name" == *.exe ]]; then
                name="${name%.exe}"
                extension=".exe"
              fi
              cp "$artifact" "release/${name}-${os}-${arch}${extension}"
            done
          (cd release && sha256sum * > SHA256SUMS.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
